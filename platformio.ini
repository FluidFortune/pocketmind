; ─────────────────────────────────────────────────────────────────
; T-DECK PLUS TARGET
; ─────────────────────────────────────────────────────────────────

[env:tdeck_pocketmind]
platform = espressif32 @ 6.7.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

upload_speed = 115200
upload_resetmethod = no_reset
upload_flags =
    --before=default_reset
    --after=hard_reset

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv

build_src_filter = +<*> -<lighthouse_terminal_4b.cpp> -<main_4b.cpp>

build_flags =
    -I include
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -fPIC
    -mfix-esp32-psram-cache-issue
    -Os
    -DPISCES_OS_VERSION=\"1.0.0\"
    -DTDECK_TARGET=1
    -DPOCKETMIND_ENABLED=1
    -DLIGHTHOUSE_HOST=\"192.168.12.177\"
    -DLIGHTHOUSE_PORT=8000

lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    lewisxhe/XPowersLib @ 0.2.1
    tamctec/TAMC_GT911 @ 1.0.2
    greiman/SdFat @ 2.2.3
    bblanchon/ArduinoJson @ 7.4.3
    h2zero/NimBLE-Arduino @ 1.4.1
    esphome/ESP32-audioI2S @ 2.1.0
    https://github.com/tzapu/WiFiManager.git

; ─────────────────────────────────────────────────────────────────
; WAVESHARE 4B TARGET
; RGB parallel display, GT911 touch, no physical keyboard
; WiFiManager captive portal on first boot
; ─────────────────────────────────────────────────────────────────

[env:waveshare4b_pocketmind]
platform = espressif32 @ 6.7.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_port = /dev/cu.usbmodem5B5E0703991
monitor_filters = esp32_exception_decoder, direct, time

upload_speed = 921600

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi
board_build.partitions = huge_app.csv

build_src_filter = +<*> -<lighthouse_terminal.cpp> -<main_tdeck.cpp>

build_flags =
    -I include
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -Os
    -DPISCES_OS_VERSION=\"1.0.0\"
    -DWAVESHARE_4B=1
    -DPOCKETMIND_ENABLED=1
    -DLIGHTHOUSE_HOST=\"192.168.12.177\"
    -DLIGHTHOUSE_PORT=8000

lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    lewisxhe/XPowersLib @ 0.2.1
    tamctec/TAMC_GT911 @ 1.0.2
    greiman/SdFat @ 2.2.3
    bblanchon/ArduinoJson @ 7.4.3
    h2zero/NimBLE-Arduino @ 1.4.1
    https://github.com/tzapu/WiFiManager.git

